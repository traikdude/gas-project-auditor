name: Deploy to Apps Script

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Restore clasp credentials
        run: |
          # clasp v3.x stores credentials in ~/.clasprc.json as { "tokens": {...} }
          # Write to both standard locations
          mkdir -p ~/.config/clasp
          printf '%s' "$CLASPRC_JSON" > ~/.clasprc.json
          printf '%s' "$CLASPRC_JSON" > ~/.config/clasp/credentials.json
          echo "✅ Credentials written"
          echo "File size: $(wc -c < ~/.clasprc.json) bytes"
          echo "Top-level keys: $(cat ~/.clasprc.json | python3 -c 'import sys,json;d=json.load(sys.stdin);print(list(d.keys()))')"
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}

      - name: Push to Apps Script
        working-directory: ${{ github.workspace }}
        run: |
          echo "Script ID: $(cat .clasp.json | python3 -c 'import sys,json;print(json.load(sys.stdin)[\"scriptId\"])')"
          clasp push --force
          echo "✅ Push complete"
