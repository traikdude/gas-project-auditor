name: Deploy to Apps Script

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Restore clasp credentials
        run: |
          # Decode base64 credentials — eliminates all encoding/BOM issues
          mkdir -p ~/.config/clasp
          echo "$CLASPRC_JSON_B64" | base64 -d > ~/.clasprc.json
          cp ~/.clasprc.json ~/.config/clasp/credentials.json
          echo "✅ Credentials restored"
          echo "File size: $(wc -c < ~/.clasprc.json) bytes"
          echo "Top-level keys: $(python3 -c 'import json; d=json.load(open("/root/.clasprc.json")); print(list(d.keys()))')"
        env:
          CLASPRC_JSON_B64: ${{ secrets.CLASPRC_JSON_B64 }}

      - name: Verify .clasp.json
        run: |
          echo ".clasp.json contents:"
          cat .clasp.json
          echo "Script ID: $(python3 -c 'import json; print(json.load(open(".clasp.json"))["scriptId"])')"

      - name: Push to Apps Script
        run: |
          clasp push --force
          echo "✅ Successfully pushed to Apps Script"
